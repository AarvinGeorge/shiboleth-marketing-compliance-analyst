# meta: CI/CD for the VPS backend (deploy plan 2026-07-14, pattern A per
# Aarvin: the repo's main branch is the source of truth for EVERYTHING —
# code AND the server .env, which this workflow renders from GitHub
# Actions secrets on every deploy; nothing on the server or a laptop
# drives production). Push to main -> rsync code to /opt/adlign/code ->
# render .env -> rebuild the prod stack (pgdata volume untouched) ->
# health smoke. The Vercel frontend deploys separately via Vercel's git
# integration. Secrets: VPS_HOST, VPS_SSH_KEY, VPS_KNOWN_HOSTS,
# POSTGRES_PASSWORD, GOOGLE_API_KEY, GROQ_API_KEY, OPENAI_API_KEY,
# ANTHROPIC_API_KEY, LANGSMITH_API_KEY. Non-secret config lives in the
# env block below — edit it here, in git, never on the server.

name: deploy-backend

on:
  push:
    branches: [main]

concurrency:
  group: deploy-backend
  cancel-in-progress: false

env:
  # --- non-secret production config (source of truth: this file) ---
  DOMAIN: 217.15.168.253.sslip.io
  LANGSMITH_TRACING: "true"
  LANGSMITH_PROJECT: adlign-production
  PAGE_CAP_MAX: "8"
  CHECKS_RATE_LIMIT_PER_HOUR: "3"
  PROTECTED_RUN_IDS: 559e0b158e41480eaa303af9cdc0d550,e9fc612df3d54fd6b035122dd7e7687c,05a9dd009201430ea56ce9f3f21aa0b1,3c09c654b7324415a3af90f7e581718a,13042afce80644d295e14ea559a3b75c
  # Vercel frontend origin(s) allowed to call the API cross-origin.
  # Rebrand window (2026-07-23): the old origin and both candidate Adlign
  # origins are allowed at once so the frontend never loses the API mid-flip.
  # Trim to the single live origin once the Vercel rename has settled.
  CORS_ALLOW_ORIGINS: https://marketing-compliance-analysis-tool.vercel.app,https://adlign.vercel.app,https://adlign-marketing-compliance-analyst.vercel.app

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.VPS_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Rsync code to VPS
        run: |
          rsync -az --delete \
            --exclude .git \
            --exclude .env \
            --exclude apps/api/src/adlign/evals/.cache \
            ./ root@${{ secrets.VPS_HOST }}:/opt/adlign/code/

      - name: Render server .env from GitHub secrets + config
        run: |
          ssh root@${{ secrets.VPS_HOST }} 'umask 077 && cat > /opt/adlign/code/.env' <<EOF
          DOMAIN=$DOMAIN
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          LANGSMITH_TRACING=$LANGSMITH_TRACING
          LANGSMITH_API_KEY=${{ secrets.LANGSMITH_API_KEY }}
          LANGSMITH_PROJECT=$LANGSMITH_PROJECT
          PAGE_CAP_MAX=$PAGE_CAP_MAX
          CHECKS_RATE_LIMIT_PER_HOUR=$CHECKS_RATE_LIMIT_PER_HOUR
          PROTECTED_RUN_IDS=$PROTECTED_RUN_IDS
          CORS_ALLOW_ORIGINS=$CORS_ALLOW_ORIGINS
          EOF

      - name: Rebuild and restart the stack
        run: |
          ssh root@${{ secrets.VPS_HOST }} '
            set -e
            cd /opt/adlign/code
            docker compose -f docker-compose.prod.yml up -d --build
            docker image prune -f
          '

      - name: Smoke check
        run: |
          for i in $(seq 1 12); do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
              "https://${{ secrets.VPS_HOST }}.sslip.io/api/health" || true)
            [ "$code" = "200" ] && echo "health OK" && exit 0
            sleep 10
          done
          echo "health check failed after 120s (last status: $code)" >&2
          exit 1
